WIFI_PWR_ON_BAT=off

# /sys/bus/pci/devices/0000:02:00.0/power/control = on   (0x028000, Network controller, ath11k_pci)

# /sys/bus/pci/devices/0000:c4:00.1/power/control = on   (0x040300, Audio device, snd_hda_intel)
# /sys/bus/pci/devices/0000:c4:00.5/power/control = on   (0x048000, Multimedia controller, snd_pci_ps)
# /sys/bus/pci/devices/0000:c4:00.6/power/control = on   (0x040300, Audio device, snd_hda_intel)

# /sys/bus/pci/devices/0000:c4:00.0/power/control = on   (0x030000, VGA compatible controller, amdgpu)
# /sys/bus/pci/devices/0000:c4:00.2/power/control = on   (0x108000, Encryption controller, ccp)
# /sys/bus/pci/devices/0000:c4:00.3/power/control = on   (0x0c0330, USB controller, xhci_hcd)
# /sys/bus/pci/devices/0000:c4:00.4/power/control = on   (0x0c0330, USB controller, xhci_hcd)
RUNTIME_PM_DISABLE="02:00.0 c4:00.1 c4:00.5 c4:00.6 c4:00.0 c4:00.2 c4:00.3 c4:00.4"

# Don't autosuspend Genesys Logic, Inc. Hub (hub) for a webcam/microphone
