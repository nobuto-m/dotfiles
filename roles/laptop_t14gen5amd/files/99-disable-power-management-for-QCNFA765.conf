WIFI_PWR_ON_BAT=off

# /sys/bus/pci/devices/0000:02:00.0/power/control = on   (0x028000, Network controller, ath11k_pci)
# /sys/bus/pci/devices/0000:c4:00.1/power/control = on   (0x040300, Audio device, snd_hda_intel)
# /sys/bus/pci/devices/0000:c4:00.5/power/control = on   (0x048000, Multimedia controller, snd_pci_ps)
# /sys/bus/pci/devices/0000:c4:00.6/power/control = on   (0x040300, Audio device, snd_hda_intel)
RUNTIME_PM_DISABLE="02:00.0 c4:00.1 c4:00.5 c4:00.6"

# Don't autosuspend Genesys Logic, Inc. Hub (hub) for a webcam/microphone
USB_DENYLIST="05e3:0626"
